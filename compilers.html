<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compilers - Testing Monitor</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="compilers.html">Testing Monitor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="compilers.html"><i class="fas fa-code me-1"></i>Compilers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tests.html"><i class="fas fa-vial me-1"></i>Tests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="headers.html"><i class="fas fa-file-code me-1"></i>Headers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tasks.html"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="loginStatus" class="navbar-text me-3 text-white"></span>
                    <button id="logoutBtn" class="btn btn-sm btn-light">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main container -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-primary text-white">
                        <h6 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Create Compiler</h6>
                    </div>
                    <div class="card-body">
                        <form id="createCompilerForm" enctype="multipart/form-data">
                            <div class="mb-2">
                                <label class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="Name" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Version <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="Version" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Command Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="CommandName" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">File (Optional)</label>
                                <input type="file" class="form-control" name="File">
                                <small class="text-muted">Upload compiler file if available</small>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-upload me-2"></i>Create
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <h6 class="mb-0"><i class="fas fa-play me-2"></i>Execute Code</h6>
                    </div>
                    <div class="card-body">
                        <form id="executeCodeForm">
                            <div class="mb-2">
                                <label class="form-label">Compiler <span class="text-danger">*</span></label>
                                <select class="form-select" id="executeCompilerId" required>
                                    <option value="">Select a compiler with Docker...</option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Code <span class="text-danger">*</span></label>
                                <textarea class="form-control code-textarea" id="executeCode" rows="6" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-play me-2"></i>Execute
                            </button>
                        </form>
                        <div id="executeResult" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <h6 class="mb-0"><i class="fas fa-list me-2"></i>Compiler List</h6>
                            <div class="d-flex gap-2">
                                <!-- Search box -->
                                <div class="input-group input-group-sm" style="width: 200px;">
                                    <span class="input-group-text bg-white"><i class="fas fa-search"></i></span>
                                    <input type="text" class="form-control" id="compilerSearch" placeholder="Search compilers...">
                                </div>
                                <!-- Docker filter -->
                                <div class="form-check form-switch me-3">
                                    <input class="form-check-input" type="checkbox" id="dockerFilter">
                                    <label class="form-check-label text-white" for="dockerFilter">Docker only</label>
                                </div>
                                <button class="btn btn-sm btn-light" onclick="compilersPage.loadCompilers()">
                                    <i class="fas fa-sync-alt"></i> Refresh
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- Active filters display -->
                        <div id="activeFilters" class="mb-2 small"></div>
                        <!-- Compiler list -->
                        <div id="compilerList">
                            <div class="text-center py-4">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Loading Overlay -->
    <script src="js/components/loading-overlay.js"></script>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/compilers.js"></script>
</body>
</html>
