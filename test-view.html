<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Test - Testing Monitor</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="compilers.html">Testing Monitor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="compilers.html"><i class="fas fa-code me-1"></i>Compilers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="tests.html"><i class="fas fa-vial me-1"></i>Tests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="headers.html"><i class="fas fa-file-code me-1"></i>Headers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tasks.html"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="loginStatus" class="navbar-text me-3 text-white"></span>
                    <button id="logoutBtn" class="btn btn-sm btn-light">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main container -->
    <div class="container mt-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="tests.html">Tests</a></li>
                <li class="breadcrumb-item active" id="testName">View Test</li>
            </ol>
        </nav>

        <!-- Test View Card -->
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="fas fa-file-code me-2"></i>Test Details</h5>
                <div>
                    <a id="editTestBtn" href="#" class="btn btn-sm btn-light me-2">
                        <i class="fas fa-edit me-1"></i>Edit
                    </a>
                    <button id="backToTestsBtn" class="btn btn-sm btn-light">
                        <i class="fas fa-arrow-left me-1"></i>Back
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Name:</label>
                            <p id="testNameDisplay" class="form-control-plaintext bg-light p-2 rounded"></p>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID:</label>
                            <p id="testIdDisplay" class="form-control-plaintext bg-light p-2 rounded text-muted"></p>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Group:</label>
                    <p id="testGroupDisplay" class="form-control-plaintext bg-light p-2 rounded"></p>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Content:</label>
                    <pre id="testContentDisplay" class="execution-result p-3" style="max-height: 500px; overflow: auto;"><code></code></pre>
                </div>
            </div>
            <div class="card-footer">
                <button id="copyContentBtn" class="btn btn-outline-secondary">
                    <i class="fas fa-copy me-1"></i>Copy Content
                </button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/test-view.js"></script>
    <script src="js/components/loading-overlay.js"></script>
</body>
</html>
