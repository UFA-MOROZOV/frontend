<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Compiler - Testing Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="compilers.html">Testing Monitor</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="compilers.html"><i class="fas fa-code me-1"></i>Compilers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tests.html"><i class="fas fa-vial me-1"></i>Tests</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="headers.html"><i class="fas fa-file-code me-1"></i>Headers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="tasks.html"><i class="fas fa-tasks me-1"></i>Tasks</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span id="loginStatus" class="navbar-text me-3 text-white"></span>
                    <button id="logoutBtn" class="btn btn-sm btn-light">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row g-3">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h6 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Compiler</h6>
                    </div>
                    <div class="card-body">
                        <form id="editCompilerForm">
                            <input type="hidden" name="Id">

                            <div class="mb-3">
                                <label class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="Name" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Version <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="Version" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Type</label>
                                <select class="form-select" id="compilerType" disabled>
                                    <option value="0">Docker</option>
                                    <option value="1">Executable</option>
                                </select>
                                <small class="text-muted">Compiler type cannot be changed after creation.</small>
                            </div>

                            <div class="mb-3 d-none" id="commandNameGroup">
                                <label class="form-label">Command Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="CommandName">
                                <small class="text-muted">Used only for Docker compilers.</small>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save changes
                            </button>
                            <a href="compilers.html" class="btn btn-outline-secondary ms-2">Back</a>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-info text-white">
                        <h6 class="mb-0"><i class="fas fa-info-circle me-2"></i>Compiler Status</h6>
                    </div>
                    <div class="card-body">
                        <div id="compilerStatus" class="small"></div>
                    </div>
                </div>

                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-secondary text-white">
                        <h6 class="mb-0"><i class="fas fa-upload me-2"></i><span id="uploadSectionTitle">Compiler File</span></h6>
                    </div>
                    <div class="card-body">
                        <form id="uploadCompilerFileForm" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label">Upload File</label>
                                <input type="file" class="form-control" id="compilerFile">
                                <small class="text-muted" id="compilerFileHint">Optional file for this compiler type</small>
                            </div>

                            <button type="submit" class="btn btn-secondary">
                                <i class="fas fa-upload me-2"></i>Upload
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm d-none" id="dockerActions">
                    <div class="card-header bg-warning">
                        <h6 class="mb-0"><i class="fas fa-box me-2"></i>Docker Actions</h6>
                    </div>
                    <div class="card-body d-flex gap-2">
                        <button type="button" class="btn btn-success" id="downloadDockerImageBtn">
                            <i class="fas fa-download me-2"></i>Download image
                        </button>
                        <button type="button" class="btn btn-outline-danger" id="deleteDockerImageBtn">
                            <i class="fas fa-trash me-2"></i>Delete image
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/components/loading-overlay.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/compiler-edit.js"></script>
</body>
</html>
